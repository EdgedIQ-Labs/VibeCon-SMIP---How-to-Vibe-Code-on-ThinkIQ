<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SMIP — Libraries (Local Twin)</title>

  <!-- ============================================================
       Local twin of  ___SMIP_SAAS_SIDE___/SMIP Browser Scripts/
                       list_libraries.html

       Browser scripts are SMIP's standalone pages — no node binding,
       no `std_inputs.node_id`. The page renders whatever it wants;
       in this case, every library in the SoR as a flat {id, displayName}
       table. Simplest possible "is the wiring alive" twin.

       Three diffs from the SMIP version (applied when pasting the body
       into the SMIP IDE):
         (a) <?php ... ?> Joomla bootstrap block — added on SMIP side
         (b) <?php echo json_encode($context|$user) ?> replaces the
             shim-injected globals. Browser scripts get the same
             $context surface as display scripts, just with an empty
             std_inputs.node_id.
         (c) <script src="/shims/tiq_runtime.js"></script> is removed
             — SMIP loads its own runtime.

       Fetches /api/tool/get_libraries on mount via the shim's
       /api/graphql-aware path; renders the rows in a Bootstrap table.
       ============================================================ -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/shims/tiq_runtime.js"></script>
  <style>
    .libs-twin { padding: 1.25rem 1.5rem; color: #1f2937; }
    .libs-twin h1 { color: #126181; font-size: 2.1rem; }
    .meta { color: #475569; font-size: .9rem; margin-bottom: 1rem; }
    .meta code { background: #f3f7f9; padding: 1px 4px; border-radius: 3px; }
    .empty-state { color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>

<div id="app" class="libs-twin">

  <div class="row">
    <div class="col-12">
      <h1 class="pb-2 pt-2">
        {{ pageTitle }}
        <a class="float-end btn btn-sm btn-link mt-2" style="font-size:1rem; color:#126181;"
           v-bind:href="`/applications/ide?node_ids=${context.std_inputs.script_id}&selected=${context.std_inputs.script_id}`"
           target="_blank">source</a>
      </h1>
      <hr style="border-color:#126181; border-width:medium;" />
    </div>
  </div>

  <p class="meta">
    Browser-script twin. Fetches <code>/api/tool/get_libraries</code> on
    mount via the local API; the SMIP-side body fetches the same shape
    through <code>tiqJSHelper</code>.
  </p>

  <div v-if="loading" class="text-muted">Loading libraries…</div>
  <div v-else-if="error" class="alert alert-danger">{{ error }}</div>
  <div v-else-if="!libraries.length" class="empty-state">
    No libraries returned.
  </div>
  <table v-else class="table table-sm table-striped" style="max-width: 720px;">
    <thead>
      <tr><th style="width:30%;">id</th><th>displayName</th></tr>
    </thead>
    <tbody>
      <tr v-for="lib in libraries" v-bind:key="lib.id">
        <td><code>{{ lib.id }}</code></td>
        <td>{{ lib.displayName }}</td>
      </tr>
    </tbody>
  </table>

</div>

<script>
  const { createApp } = Vue;

  // Browser scripts don't get a meaningful node_id — they're page-level,
  // not instance-level. The shim populates std_inputs.node_id with ""
  // from URL params when present; we don't care here.
  //
  // Calling /api/tool/get_libraries directly (via the registry-backed
  // dispatch) is the cleanest path for this twin — we don't need raw
  // GraphQL because the tool already returns the {id, displayName}
  // shape we want. The SMIP-side body uses tiqJSHelper.invokeGraphQLAsync
  // against a one-shot inline query for parity, since SMIP doesn't have
  // /api/tool/<name>.

  const app = createApp({
    data() {
      return {
        context:    window.tiqContext || { std_inputs: { node_id: "", script_id: "" } },
        user:       window.tiqUser    || null,
        pageTitle:  "SMIP Libraries",
        loading:    true,
        error:      "",
        libraries:  [],
      };
    },
    async mounted() {
      try {
        const resp = await fetch('/api/tool/get_libraries', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ args: {} }),
        });
        const env = await resp.json();
        if (!env.ok) throw new Error(env.error || ('HTTP ' + resp.status));
        this.libraries = env.data || [];
      } catch (e) {
        this.error = e.message || String(e);
      } finally {
        this.loading = false;
      }
    },
  });

  if (window.__registerTiqComponentStubs) {
    window.__registerTiqComponentStubs(app._context.app || app);
  }
  app.mount('#app');
</script>

</body>
</html>
